name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck-test:
    name: Typecheck & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @kojihq/core build
      - run: pnpm --filter @kojihq/core-sqlite build
      # apps/cli の statusline-hang.test.ts が dist/index.js を spawn するため、test 前に web + lens build が必要
      # (2026-05-10 Phase A 前テスト追加で必須化、深町 CTO 諮問結果採用)
      - run: pnpm --filter @kojihq/web build
      - run: pnpm --filter @kojihq/lens build
      - run: pnpm typecheck
      - run: pnpm test

  build:
    name: Build (workspace order, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      # apps/cli depends on apps/web's standalone output
      # explicit ordering avoids parallel race that broke 2026-04-30 CI
      - name: Build @kojihq/core
        run: pnpm --filter @kojihq/core build
      - name: Build @kojihq/core-sqlite
        run: pnpm --filter @kojihq/core-sqlite build
      - name: Build @kojihq/web (standalone)
        run: pnpm --filter @kojihq/web build
      - name: Build @kojihq/lens (CLI + bundle web-standalone)
        run: pnpm --filter @kojihq/lens build
      - name: Smoke check CLI
        shell: bash
        run: |
          node apps/cli/dist/index.js --version
          node apps/cli/dist/index.js --help > /dev/null
