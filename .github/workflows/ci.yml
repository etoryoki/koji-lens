name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck-test:
    name: Typecheck & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @kojihq/core build
      - run: pnpm typecheck
      - run: pnpm test

  build:
    name: Build (workspace order)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      # apps/cli depends on apps/web's standalone output
      # explicit ordering avoids parallel race that broke 2026-04-30 CI
      - name: Build @kojihq/core
        run: pnpm --filter @kojihq/core build
      - name: Build @kojihq/web (standalone)
        run: pnpm --filter @kojihq/web build
      - name: Build @kojihq/lens (CLI + bundle web-standalone)
        run: pnpm --filter @kojihq/lens build
      - name: Build @kojihq/lp
        run: pnpm --filter @kojihq/lp build
      - name: Smoke check CLI
        run: |
          node apps/cli/dist/index.js --version
          node apps/cli/dist/index.js --help > /dev/null
