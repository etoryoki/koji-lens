name: 🐛 Bug report
description: Report unexpected behavior or an error
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below — clearer reports get fixed faster.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: e.g., "koji-lens summary errors out on JSONL files larger than 100 MB"
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Run `koji-lens summary --since 30d`
        2. Wait for ~5 seconds
        3. Error appears: ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: koji-lens version
      description: Output of `koji-lens --version`
      placeholder: e.g., 0.1.0-beta.3
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      description: Output of `node --version`
      placeholder: e.g., v22.16.0
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other (specify in additional context)
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error output / logs
      description: Paste any relevant error messages or stack traces. Sanitize personal info before submitting.
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context about the problem (e.g., custom config, unusual setup).
